<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Weather</title>
    <!-- iOS Web App capability and PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="app-body">
    <!-- Dynamic background canvas/divs can go here if needed -->
    <div id="weather-background" class="weather-bg"></div>

    <div class="app-container">
        <!-- Search Bar at the top -->
        <header class="search-section">
            <div class="search-bar">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="city-input" placeholder="Search for a city..." aria-label="City search">
            </div>
            <!-- Quick Select (Dynamic via JS) -->
            <nav class="quick-select" id="quick-select">
                <!-- Buttons injected via JS -->
            </nav>
        </header>

        <!-- Loading & Error States -->
        <div id="loader" class="loader hidden">
            <div class="spinner"></div>
        </div>
        <div id="error-message" class="error hidden">City not found. Please try again.</div>

        <!-- Main Weather Display -->
        <main id="weather-main" class="weather-main hidden">
            <!-- Top Section Header -->
            <div class="weather-header">
                <h1 id="city-name" class="city-name">--</h1>
                <h2 id="temperature" class="temperature">--&deg;</h2>
                <p id="weather-desc" class="weather-desc">--</p>
                <p class="high-low">H:<span id="temp-high">--&deg;</span> L:<span id="temp-low">--&deg;</span></p>
            </div>

            <!-- Scrollable Content -->
            <div class="scroll-content">
                
                <!-- Hourly Forecast Card -->
                <section class="glass-card hourly-card">
                    <p class="card-header"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> HOURLY FORECAST</p>
                    <div id="hourly-container" class="hourly-slider">
                        <!-- Injected via JS -->
                    </div>
                </section>

                <!-- 5-Day Forecast Card -->
                <section class="glass-card daily-card">
                    <p class="card-header"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> 5-DAY FORECAST</p>
                    <div id="forecast-container" class="daily-list">
                        <!-- Injected via JS -->
                    </div>
                </section>

                <!-- Details Grid -->
                <section class="details-grid">
                    <div class="glass-card square-card">
                        <p class="card-header"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg> HUMIDITY</p>
                        <div class="card-value" id="humidity">--%</div>
                    </div>
                    <div class="glass-card square-card">
                        <p class="card-header"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path></svg> WIND</p>
                        <div class="card-value" id="wind-speed">--<span class="unit">m/s</span></div>
                    </div>
                    <div class="glass-card square-card">
                        <p class="card-header"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg> FEELS LIKE</p>
                        <div class="card-value" id="feels-like">--&deg;</div>
                    </div>
                    <div class="glass-card square-card">
                        <p class="card-header"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg> VISIBILITY</p>
                        <div class="card-value" id="visibility">--<span class="unit">km</span></div>
                    </div>
                </section>

                <footer class="app-signature">
                    Designed & Developed by <span><a href="https://portfolio-45d240.gitlab.io/">Ameziane Omar</a></span>
                </footer>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
